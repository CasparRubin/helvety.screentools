name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, arm64]
        include:
          - platform: x64
            rid: win-x64
          - platform: arm64
            rid: win-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: >
          dotnet publish helvety.screentools/helvety.screentools.csproj
          -c Release
          -p:Platform=${{ matrix.platform }}
          -p:RuntimeIdentifier=${{ matrix.rid }}

      - name: Zip release
        shell: pwsh
        run: |
          $publishDir = "helvety.screentools/bin/Release/net8.0-windows10.0.19041.0/${{ matrix.rid }}/publish"
          $version = "${{ github.ref_name }}"
          $zipName = "helvety-screentools-${version}-${{ matrix.rid }}.zip"
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: "*.zip"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.zip"
